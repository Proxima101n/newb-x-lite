name = "Newb X Lite"
version = [0, 1, 0]
min_supported_mc_version = [1, 26, 0]
description = '''
§c%w
§7- An enchanced vanilla shader for Minecraft! newb x legacy but stripped down even more with attempted better lighting
%v
§3https://devendrn.github.io/newb-shader/
''' # %w = patch warning, %v = version
authors = ["Proxima"]
url = "https://github.com/Proxima101n/newb-x-lite"
uuid ="7d3f9a12-4b8c-4e21-93ad-6f1c2e874d50" # Use https://www.uuidgenerator.net/version4
materials = ["Sky", "RenderChunk", "Actor", "ActorGlint", "EndSky", "Clouds", "SunMoon", "Weather", "ItemInHandTextured", "ItemInHandColor", "ItemInHandColorGlint", "Stars"]

[info] 
copyright = '''
