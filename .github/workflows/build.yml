name: build

on:
  workflow_dispatch:
    inputs:
      subversion:
        description: 'Sub-version (eg: 46)'
        required: true
        type: string
      platform:
        description: 'platform'
        required: true
        default: 'Merged'
        type: choice
        options:
        - Android
        - Windows
        - IOS
        - Merged
        - All

jobs:
  windows:
    runs-on: windows-2022
    if:  ${{ (github.event.inputs.platform == 'Windows') || (github.event.inputs.platform == 'All') }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11' 
        cache: 'pip'
    - run: pip install -r requirements.txt
    - run: |
        # setup directory structure manually to bypass broken links
        if not exist "tool\data\materials" mkdir "tool\data\materials"
        xcopy /s /e /y "src\materials\*" "tool\data\materials\"
        
        # run pack without setup to preserve our custom files
        .\build.bat pack -p windows -v ${{ inputs.subversion }} --no-zip
    - uses: actions/upload-artifact@v4
      with:
        name: newb-x-windows
        path: ./build/pack-windows

  android:
    runs-on: ubuntu-latest
    if:  ${{ (github.event.inputs.platform == 'Android') || (github.event.inputs.platform == 'All') }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11' 
        cache: 'pip'
    - run: pip install -r requirements.txt
    - run: |
        # 1. create the directories the builder expects
        mkdir -p tool/data/materials
        
        # 2. get the compiler binary
        wget -O tool/data/shaderc https://github.com/devendrn/newb-shader/releases/download/dev/shaderc-linux-x64
        chmod +x tool/data/shaderc
        
        # 3. sync your custom 1.26.10 materials into the build cache
        # this stops the "list index out of range" error
        cp -r src/materials/* tool/data/materials/
        
        # 4. run the pack command
        ./build.sh pack -p android -v ${{ inputs.subversion }} --no-zip
    - uses: actions/upload-artifact@v4
      with:
        name: newb-x-android
        path: ./build/pack-android

  ios:
    runs-on: ubuntu-latest
    if:  ${{ (github.event.inputs.platform == 'IOS') || (github.event.inputs.platform == 'All') }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11' 
        cache: 'pip'
    - run: pip install -r requirements.txt
    - run: |
        mkdir -p tool/data/materials
        cp -r src/materials/* tool/data/materials/
        ./build.sh pack -p ios -v ${{ inputs.subversion }} --no-zip
    - uses: actions/upload-artifact@v4
      with:
        name: newb-x-ios
        path: ./build/pack-ios

  merged:
    runs-on: windows-2022
    if:  ${{ (github.event.inputs.platform == 'Merged') || (github.event.inputs.platform == 'All')}}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11' 
        cache: 'pip'
    - run: pip install -r requirements.txt
    - run: |
        if not exist "tool\data\materials" mkdir "tool\data\materials"
        xcopy /s /e /y "src\materials\*" "tool\data\materials\"
        .\build.bat pack -p merged -v ${{ inputs.subversion }} --no-zip
    - uses: actions/upload-artifact@v4
      with:
        name: newb-x-merged
        path: ./build/pack-merged
